<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4CAF50" />
  <title>Mijn Gezondheid</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <header>
    <h1 id="appNaam">Mijn Gezondheid</h1>
    <button onclick="taalWisselen()">🌐 NL / EN</button>
  </header>

  <nav>
    <a href="./index.html" data-i18n="nav.home"> Home</a>
    <a href="./invoer.html" data-i18n="nav.invoer"> Invoer</a>
    <a href="./overzicht.html" data-i18n="nav.overzicht"> Overzicht</a>
  </nav>

  <main>
    <h2 data-i18n="home.titel">Vandaag</h2>
    <p id="datum"></p>

    <div class="kaarten">
      <div class="kaart groen">
        <p data-i18n="cat.voeding">Voeding</p>
        <strong id="totaal-voeding">0 kcal</strong>
      </div>
      <div class="kaart blauw">
        <p data-i18n="cat.beweging">Beweging</p>
        <strong id="totaal-beweging">0 min</strong>
      </div>
      <div class="kaart paars">
        <p data-i18n="cat.slaap">Slaap</p>
        <strong id="totaal-slaap">0 uur</strong>
      </div>
      <div class="kaart oranje">
        <p data-i18n="cat.water">Water</p>
        <strong id="totaal-water">0 ml</strong>
      </div>
    </div>

    <h3 data-i18n="home.recent">Recent toegevoegd</h3>
    <ul id="recenteLijst">
      <li data-i18n="home.leeg">Niks toegevoegd vandaag.</li>
    </ul>
  </main>

  <footer>
    <p>© 2026 Gezondheids App</p>
  </footer>

  <script src="./js/taal.js"></script>
  <script src="./js/opslag.js"></script>
  <script src="./js/home.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>

</body>
</html>
